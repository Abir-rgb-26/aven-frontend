<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVEN AI // Tactical Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div class="brand">AVEN // AI</div>
        <button class="new-chat-btn">+ NEW SESSION</button>
        <div class="history-section">
            <div class="history-title">Recent Intel</div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="bot-status">
                <div class="status-dot"></div>
                <div>
                    <h4 style="font-weight: 600;">AVEN AI v1.0.01</h4>
                    <p style="font-size: 0.75rem; color: var(--text-muted);">Online & Ready</p>
                </div>
            </div>
        </div>

        <div class="messages-box" id="chatBox">
            </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask for strategies, builds, or game meta...">
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
